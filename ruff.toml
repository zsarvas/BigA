line-length = 100
target-version = "py311"

[lint]
# E/W = pycodestyle, F = pyflakes (real bugs), I = isort import sorting.
select = ["E", "F", "W", "I"]
# Line length is advisory here; ruff format keeps new code tidy without churning
# the many existing long lines (URLs, f-strings, layout constants).
ignore = ["E501"]

[lint.per-file-ignores]
# Entry points intentionally configure env / sys.path before importing pygame
# and friends, so module-level imports can't all sit at the top.
"run_pi_ui.py" = ["E402"]
"setup.py" = ["E402"]
"src/angels-tracker.py" = ["E402"]
"src/pi_tracker/__main__.py" = ["E402"]
"src/pi_tracker/app.py" = ["E402"]
