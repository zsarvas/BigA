# Redirect ALL DNS queries to the Pi's gateway IP.
# Note: modern iOS/Android use HTTPS for captive portal probing, so the
# auto-popup no longer works reliably without a trusted cert. The DNS redirect
# still ensures any hostname the user types resolves here, and the QR code
# takes them directly to the portal with one tap.
address=/#/192.168.4.1

# Friendly name: http://biga.setup opens the portal (works on iOS/Android/Mac
# once the user is on the BigA-XXXX network, no IP to remember).
address=/biga.setup/192.168.4.1
