# NetworkManager shared-AP dnsmasq (ipv4.method=shared on biga-ap).
#
# Wildcard DNS makes every hostname resolve to the Pi so HTTP captive probes
# hit portal.py on port 80.  DHCP option 114 (RFC 7710) tells iOS/Android
# where the login page lives without relying on HTTPS probes.

# All DNS → Pi gateway (catches captive.apple.com, connectivitycheck.gstatic.com, …)
address=/#/192.168.4.1

# Friendly hostname — user can type http://biga.setup if CNA sheet does not appear.
address=/biga.setup/192.168.4.1

# Common OS captive-detection hosts (redundant with /#/ but explicit for debugging).
address=/captive.apple.com/192.168.4.1
address=/connectivitycheck.gstatic.com/192.168.4.1
address=/clients3.google.com/192.168.4.1
address=/www.msftconnecttest.com/192.168.4.1

# Captive Portal URI — iOS 14+ / Android may open this without a DNS probe.
dhcp-option=114,http://192.168.4.1/
