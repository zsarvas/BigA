<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connected — BigA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:   #BA0021;
      --navy:  #003263;
      --gold:  #C4A84F;
      --white: #FFFFFF;
      --bg:    #0a0f1e;
      --card:  #111827;
      --muted: #6b7f99;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      text-align: center;
    }

    .check-circle {
      width: 88px;
      height: 88px;
      background: rgba(196, 168, 79, 0.12);
      border: 3px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      margin-bottom: 24px;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 8px; }
    h1 span { color: var(--gold); }

    .ssid-badge {
      display: inline-block;
      background: rgba(0, 50, 99, 0.5);
      border: 1px solid var(--navy);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      margin: 12px 0 24px;
    }

    .note {
      font-size: 0.875rem;
      color: var(--muted);
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .disconnect-note {
      font-size: 0.75rem;
      color: var(--muted);
      max-width: 280px;
      line-height: 1.5;
    }

    .disconnect-note strong { color: var(--white); }
  </style>
</head>
<body>

  <div class="check-circle">✓</div>

  <h1>You're <span>connected!</span></h1>

  <div class="ssid-badge">{{ ssid }}</div>

  <p class="note">
    The Big A scoreboard is now connecting to your network.
    It may take a moment to come online.
  </p>

  <p class="disconnect-note">
    Your phone will disconnect from <strong>{{ ap_ssid }}</strong> and rejoin
    your home network automatically.
  </p>

</body>
</html>
